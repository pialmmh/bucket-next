# bucket-next — sample configuration
# All keys; defaults shown for the optional ones.

# Required.
shard_id: 1            # this node's shard id, 1..total_shards
total_shards: 1        # cluster size, 1..1024
listen_port: 7001      # HTTP port
state_path: ./data/state.json   # absolute or relative; parent dir auto-created

# Optional — tuning knobs.
segment_size: 1000     # IDs reserved per disk write (int/long types only)
segment_refill_watermark: 0.9   # async-refill when this fraction of segment consumed
clock_drift_tolerance_ms: 0     # snowflake: max backward clock jump tolerated by waiting

# Snowflake epoch. Default = 2024-01-01 UTC in unix-millis.
snowflake_epoch_ms: 1704067200000
