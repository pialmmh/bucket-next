# Tenant: link3
# One section per profile. Each profile lists every shard's server.
# A single deploy command (deploy.sh link3 <profile>) hits every shard in order.

# ----------------------------------------------------------------------
# DEV — 3 shards on developer VMs
# ----------------------------------------------------------------------
[dev]
description           = link3 dev cluster, 3 shards
inventory_tenant      = link3

# Service tuning — applied identically to every shard in this profile.
listen_port           = 7001
state_path            = /var/lib/bucket-next/state.json
segment_size          = 1000
segment_refill_watermark = 0.9
clock_drift_tolerance_ms = 0
snowflake_epoch_ms    = 1704067200000

# Cluster sizing — total_shards must equal the count of shardN.server keys below.
total_shards          = 3

# Per-shard server assignment.
# Format: shardN.server = <inventory-host-file-name>
# The host file lives at deploy/ssh-inventory/<inventory_tenant>/hosts/<name>
shard1.server         = link3-dev-1
shard2.server         = link3-dev-2
shard3.server         = link3-dev-3


# ----------------------------------------------------------------------
# STAGING — 3 shards on staging VMs
# ----------------------------------------------------------------------
[staging]
description           = link3 staging cluster, 3 shards
inventory_tenant      = link3

listen_port           = 7001
state_path            = /var/lib/bucket-next/state.json
segment_size          = 2000
segment_refill_watermark = 0.85
total_shards          = 3

shard1.server         = link3-staging-1
shard2.server         = link3-staging-2
shard3.server         = link3-staging-3


# ----------------------------------------------------------------------
# PROD — 5 shards on production VMs
# ----------------------------------------------------------------------
[prod]
description           = link3 production cluster, 5 shards
inventory_tenant      = link3

listen_port           = 7001
state_path            = /var/lib/bucket-next/state.json
segment_size          = 5000
segment_refill_watermark = 0.8
total_shards          = 5

shard1.server         = link3-prod-1
shard2.server         = link3-prod-2
shard3.server         = link3-prod-3
shard4.server         = link3-prod-4
shard5.server         = link3-prod-5
