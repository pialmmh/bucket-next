# Tenant: tcteltd
# Example of a small two-shard tenant. Add profiles and shards as needed.

[dev]
description           = tcteltd dev, 2 shards on a single dev box (port-separated)
inventory_tenant      = tcteltd

listen_port           = 7001
state_path            = /var/lib/bucket-next/state.json
segment_size          = 1000
segment_refill_watermark = 0.9
total_shards          = 2

# In a multi-shards-on-one-host deploy, each shard host file should point to the
# same machine with a different listen_port_override (see ssh-inventory/.../hosts).
shard1.server         = tcteltd-dev-1a
shard2.server         = tcteltd-dev-1b


[prod]
description           = tcteltd production, 2 shards on dedicated VMs
inventory_tenant      = tcteltd

listen_port           = 7001
state_path            = /var/lib/bucket-next/state.json
segment_size          = 5000
segment_refill_watermark = 0.8
total_shards          = 2

shard1.server         = tcteltd-prod-1
shard2.server         = tcteltd-prod-2
